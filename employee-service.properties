server.port = 8081

eureka.client.service-url.defaultZone = http://eureka-server:8761/eureka

spring.datasource.url = jdbc:postgresql://postgres-db:5432/employee_db
spring.datasource.username = postgres
spring.datasource.password = Achint@123

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true

management.endpoints.web.exposure.include=*

eureka.instance.prefer-ip-address=true

resilience4j.circuitbreaker.instances.departmentService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.departmentService.minimum-number-of-calls=2
resilience4j.circuitbreaker.instances.departmentService.sliding-window-size=4
resilience4j.circuitbreaker.instances.departmentService.wait-duration-in-open-state=10s
